name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: npm ci
      - run: npm run prepare:assets
      - run: npm run check
      - run: npm test
      - run: npm run build:native
      - name: Validate Magisk shell scripts
        shell: bash
        run: find magisk -type f \( -name '*.sh' -o -path '*/system/bin/endodeckctl' \) -print0 | xargs -0 -n1 sh -n

  package:
    runs-on: windows-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: npm ci
      - run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/fetch-platform-tools.ps1
      - run: npm run prepare:assets
      - run: npm run build:native
      - name: Prepare optional artifact folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force dist | Out-Null
      - run: npm run build:desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: endodeck-installer-update
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
