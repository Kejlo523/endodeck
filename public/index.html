<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#080a08">
  <title>EndoDeck</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="deck-shell">
    <header class="deck-header">
      <div class="brand"><span class="brand-mark"></span><div><strong id="deck-title">ENDO DECK</strong><span id="page-label">Główna</span></div></div>
      <div class="now-playing hidden" id="now-playing" aria-hidden="true">
        <span class="eq" id="now-playing-eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span class="np-copy"><strong id="now-playing-title">—</strong><small id="now-playing-artist"></small></span>
      </div>
      <div class="status-line">
        <span class="status" id="usb-status"><i></i>USB</span><span class="power-status" id="power-status">-- mA</span><span class="battery-status" id="battery-status">--%</span><time id="clock">00:00</time>
        <button class="settings-trigger" id="settings-trigger" aria-label="Ustawienia decka" title="Ustawienia decka"></button>
      </div>
    </header>
    <section class="button-grid" id="button-grid" aria-live="polite"></section>
    <div class="toast" id="toast" role="status"></div>
  </main>

  <section class="settings-panel hidden" id="settings-panel" aria-hidden="true">
    <div class="settings-card simple-settings-card">
      <header class="settings-header">
        <div><strong>USTAWIENIA DECKA</strong><span>Kafelki i akcje edytujesz w EndoDeck Studio na komputerze</span></div>
        <button id="settings-close" class="settings-close" aria-label="Zamknij">×</button>
      </header>
      <form id="settings-form" class="simple-settings-form">
        <label><span>KOLOR AKCENTU</span><small>Wspólny kolor interfejsu i wygaszacza</small><input id="edit-accent" type="color" aria-label="Kolor akcentu"></label>
        <label><span>PRZYCIEMNIENIE</span><small>Po ilu sekundach ekran zaczyna płynnie ciemnieć</small><div class="number-setting"><input id="edit-dim" type="number" min="10" max="3600"><b>SEK.</b></div></label>
        <label><span>WYGASZACZ</span><small>Po ilu sekundach pojawia się zegar i pogoda</small><div class="number-setting"><input id="edit-saver" type="number" min="30" max="7200"><b>SEK.</b></div></label>
        <label class="toggle-setting"><span>TERAZ GRA</span><small>Tytuł i wykonawca utworu ze Spotify, YouTube i innych odtwarzaczy</small><label class="switch"><input id="edit-nowplaying" type="checkbox"><i></i></label></label>
        <label class="toggle-setting"><span>EQUALIZER</span><small>Animowane słupki przy informacji o utworze</small><label class="switch"><input id="edit-equalizer" type="checkbox"><i></i></label></label>
        <button class="settings-save" type="submit">ZAPISZ USTAWIENIA</button>
      </form>
    </div>
  </section>

  <section class="source-panel hidden" id="source-panel" aria-hidden="true">
    <div class="source-card">
      <header class="source-header"><strong>WYBIERZ ŹRÓDŁO</strong></header>
      <div class="source-list" id="source-list"><div class="source-empty">ŁADUJĘ URZĄDZENIA…</div></div>
      <button class="source-close" id="source-close" type="button">ZAMKNIJ OKNO</button>
    </div>
  </section>

  <section class="screensaver hidden" id="screensaver" aria-hidden="true">
    <div class="ambient-orbit orbit-a"></div><div class="ambient-orbit orbit-b"></div>
    <header class="saver-status"><span id="saver-pc"><i></i>PC</span><span id="saver-power">-- mA</span><span id="saver-battery">--%</span></header>
    <main class="saver-main">
      <div class="saver-time"><time id="saver-clock"><span id="saver-main-time">00:00</span><small id="saver-seconds">00</small></time><span id="saver-date">---</span></div>
      <div class="weather-now"><span class="weather-symbol" id="weather-symbol">·</span><strong id="weather-temp">--°</strong><div><b id="weather-city">Warszawa</b><span id="weather-description">Pobieram pogodę</span></div></div>
      <section class="saver-telemetry" aria-label="Stan komputera">
        <div class="metric-ring-card">
          <span class="metric-ring">
            <svg viewBox="0 0 42 42" aria-hidden="true"><circle class="ring-track" cx="21" cy="21" r="16"></circle><circle class="ring-value" id="metric-cpu-ring" cx="21" cy="21" r="16"></circle></svg>
            <strong id="metric-cpu">--%</strong>
          </span>
          <span class="metric-copy"><small>CPU</small><b id="metric-cpu-temp">TEMP. —</b></span>
        </div>
        <div class="metric-ring-card">
          <span class="metric-ring">
            <svg viewBox="0 0 42 42" aria-hidden="true"><circle class="ring-track" cx="21" cy="21" r="16"></circle><circle class="ring-value" id="metric-gpu-ring" cx="21" cy="21" r="16"></circle></svg>
            <strong id="metric-gpu">--%</strong>
          </span>
          <span class="metric-copy"><small>GPU</small><b id="metric-gpu-temp">TEMP. —</b></span>
        </div>
        <div class="metric-ring-card">
          <span class="metric-ring">
            <svg viewBox="0 0 42 42" aria-hidden="true"><circle class="ring-track" cx="21" cy="21" r="16"></circle><circle class="ring-value" id="metric-ram-ring" cx="21" cy="21" r="16"></circle></svg>
            <strong id="metric-ram">--%</strong>
          </span>
          <span class="metric-copy"><small>RAM</small><b id="metric-ram-used">-- GB</b></span>
        </div>
        <div class="metric-network"><small>SIEĆ</small><strong id="metric-net-down">↓ --</strong><span id="metric-net-up">↑ --</span></div>
      </section>
      <div class="forecast" id="forecast"></div>
      <div class="saver-now-playing hidden" id="saver-now-playing" aria-hidden="true">
        <span class="eq saver-eq" id="saver-now-playing-eq" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
        <span class="np-copy"><b>TERAZ GRA</b><strong id="saver-now-playing-title">—</strong><span id="saver-now-playing-artist"></span></span>
      </div>
    </main>
    <footer>DOTKNIJ, ABY WRÓCIĆ DO ENDO DECK</footer>
  </section>
  <script type="module" src="/app.js"></script>
</body>
</html>
