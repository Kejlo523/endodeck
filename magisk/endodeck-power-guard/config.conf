# Seconds the offline screen remains visible before deep sleep.
DISCONNECT_SLEEP_SECONDS=45

# Keep cellular radio disabled while the deck is connected.
KEEP_AIRPLANE_CONNECTED=1

# Wi-Fi may stay enabled in airplane mode for lightweight weather refreshes.
KEEP_WIFI_FOR_WEATHER=1

# Keep the offline screensaver awake while USB/AC power is still present.
POWERED_OFFLINE_SCREENSAVER=1

# Android component launched after the PC USB host becomes available.
DECK_COMPONENT=pl.endozero.endodeck/.MainActivity
